# ═══════════════════════════════════════════
#  MediTwin AI — Docker Compose
#  Full-stack: Backend + Frontend
# ═══════════════════════════════════════════

version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meditwin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=openai/gpt-oss-120b
      - SECRET_KEY=${SECRET_KEY:-meditwin-dev-secret-change-me}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - ENABLE_OCR=true
      - LOG_LEVEL=info
    volumes:
      - ml_models:/app/models/trained
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - meditwin-net

  # ── React Frontend (Vite Dev) ───────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meditwin-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meditwin-net

volumes:
  ml_models:
    driver: local

networks:
  meditwin-net:
    driver: bridge
